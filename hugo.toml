baseURL = "https://mikuta9nai.github.io/"
languageCode = "en-US"
title = "mikuta9nai's blog"
theme = "PaperMod"
paginate = 10

[params]
  author = "mikuta9nai"
  description = "A blog where I document what I study"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowFullTextinRSS = true

[params.giscus]
  enable = false           # Giscus 설정 완료 후 true로 변경
  repo = "mikuta9nai/mikuta9nai.github.io"
  repoId = ""              # giscus.app 에서 발급
  category = "Announcements"
  categoryId = ""          # giscus.app 에서 발급

[markup.highlight]
  lineNos = true
  lineNumbersInTable = true
  style = "github-dark"

[params.homeInfoParams]
  Title = "Hi there"
  Content = "A place where I document what I study and learn."

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/mikuta9nai"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 30

[[menu.main]]
  identifier = "archives"
  name = "Archives"
  url = "/archives/"
  weight = 40

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]
